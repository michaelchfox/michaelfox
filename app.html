<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paul Simon Lyric Generator</title>
  <style>
    body {
      background-color: #f5e6c8;
      font-family: Georgia, serif;
      color: #3b2a1a;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #topnav {
      background-color: #c1440e;
      padding: 1rem 2rem;
    }

    #topnav a {
      color: #f5e6c8;
      text-decoration: none;
      margin-right: 1.5rem;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
    }

    #topnav a:hover {
      color: white;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      text-align: center;
    }

    h1 {
      color: #c1440e;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    #subtitle {
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #3b2a1a;
      margin-bottom: 3rem;
    }

    #lyric-box {
      background-color: white;
      border-left: 4px solid #c1440e;
      padding: 2.5rem 2rem;
      max-width: 600px;
      width: 100%;
      margin-bottom: 2rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      min-height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #lyric {
      font-size: 1.4rem;
      font-style: italic;
      line-height: 1.6;
      color: #3b2a1a;
      margin-bottom: 1.25rem;
      white-space: pre-line;
    }

    #song {
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #c1440e;
      font-weight: bold;
    }

    #generate-btn {
      background-color: #c1440e;
      color: #f5e6c8;
      border: none;
      padding: 1rem 2.5rem;
      font-size: 1rem;
      font-family: Georgia, serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    #generate-btn:hover {
      background-color: #a03a0c;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: #3b2a1a;
      font-size: 0.85rem;
      border-top: 2px solid #c1440e;
    }

    footer a {
      color: #c1440e;
    }
  </style>
</head>
<body>

  <div id="topnav">
    <a href="index.html">Home</a>
    <a href="scratch.html">Graceland</a>
  </div>

  <div id="main">
    <h1>Paul Simon Lyric Generator</h1>
    <p id="subtitle">Experience the beautiful mind of Paul Simon.</p>

    <div id="lyric-box">
      <p id="lyric">Click the button below for a random Paul Simon lyric.</p>
      <p id="song"></p>
    </div>

    <button id="generate-btn" onclick="generateLyric()">Generate Lyric</button>
  </div>

  <footer>
    <p>By Michael Fox · <a href="index.html">Home</a> · <a href="scratch.html">Graceland</a></p>
  </footer>

  <script>
    const lyrics = [
      { line: "I'm going to Graceland, Graceland\nMemphis, Tennessee\nI'm going to Graceland", song: "Graceland" },
      { line: "These are the days of miracle and wonder\nThis is the long distance call", song: "The Boy in the Bubble" },
      { line: "A man walks down the street\nHe says why am I soft in the middle now?", song: "You Can Call Me Al" },
      { line: "She said honey take me dancing\nBut they ended up by sleeping in a doorway", song: "You Can Call Me Al" },
      { line: "Hello darkness, my old friend\nI've come to talk with you again", song: "The Sound of Silence" },
      { line: "And the vision that was planted in my brain\nStill remains within the sound of silence", song: "The Sound of Silence" },
      { line: "Slow down, you move too fast\nYou got to make the morning last", song: "The 59th Street Bridge Song (Feelin' Groovy)" },
      { line: "Like a bridge over troubled water\nI will lay me down", song: "Bridge Over Troubled Water" },
      { line: "Sail on, silver girl\nSail on by\nYour time has come to shine", song: "Bridge Over Troubled Water" },
      { line: "The problem is all inside your head, she said to me\nThe answer is easy if you take it logically", song: "50 Ways to Leave Your Lover" },
      { line: "You just slip out the back, Jack\nMake a new plan, Stan", song: "50 Ways to Leave Your Lover" },
      { line: "When I think back on all the crap I learned in high school\nIt's a wonder I can think at all", song: "Kodachrome" },
      { line: "Mama don't take my Kodachrome away", song: "Kodachrome" },
      { line: "Still crazy after all these years\nOh still crazy after all these years", song: "Still Crazy After All These Years" },
      { line: "She comes back to tell me she's gone\nAs if I didn't know that\nAs if I didn't know my own bed", song: "Graceland" },
      { line: "Losing love is like a window in your heart\nEverybody sees you're blown apart", song: "Graceland" },
      { line: "The Mississippi Delta was shining like a National guitar", song: "Graceland" },
      { line: "I am just a poor boy, though my story's seldom told\nI have squandered my resistance", song: "The Boxer" },
      { line: "In the clearing stands a boxer, and a fighter by his trade\nAnd he carries the reminders", song: "The Boxer" },
      { line: "Poor boy, empty as a pocket\nEmpty as a pocket with nothing to lose", song: "Diamonds on the Soles of Her Shoes" },
      { line: "She got diamonds on the soles of her shoes\nWell that's one way to lose these walking blues", song: "Diamonds on the Soles of Her Shoes" },
      { line: "I'm empty and aching and I don't know why\nCounting the cars on the New Jersey Turnpike", song: "America" },
      { line: "Kathy, I said as we boarded a Greyhound in Pittsburgh\nMichigan seems like a dream to me now", song: "America" },
      { line: "Gumboots ain't no trifling thing", song: "Gumboots" },
      { line: "Cattle in the marketplace\nScatterings and orphanages", song: "The Boy in the Bubble" },
      { line: "Don't cry baby, don't cry\nDon't cry", song: "Graceland" },
      { line: "I'd rather be a hammer than a nail\nYes I would, if I could, I surely would", song: "El Condor Pasa (If I Could)" },
      { line: "Time it was, and what a time it was, it was\nA time of innocence, a time of confidences", song: "Bookends" },
      { line: "Long ago it must be\nI have a photograph\nPreserve your memories", song: "Bookends" },
      { line: "Where have you gone, Joe DiMaggio?\nA nation turns its lonely eyes to you", song: "Mrs. Robinson" },
      { line: "He makes the sign of a teaspoon\nShe makes the sign of a wave\nThe poor boy changes clothes and he puts on aftershave", song: "Diamonds on the Soles of her Shoes"},
      { line: "One and one half wandering Jews\nFree to wander wherever they choose", song: "Hearts and Bones" },
      { line: "To resume old acquaintances\nAnd step out occasionally\nAnd speculate who had been damaged the most", song: "Hearts and Bones" }
    ];

    function generateLyric() {
      const random = lyrics[Math.floor(Math.random() * lyrics.length)];
      document.getElementById("lyric").textContent = random.line;
      document.getElementById("song").textContent = "— " + random.song;
    }
  </script>

</body>
</html>
